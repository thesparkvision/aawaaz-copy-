# Layered macOS Build Workflow

name: macOS Build Workflow

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v2
      - name: Set up Xcode
        uses: actions/setup-xcode@v2
      - name: Build
        run: | 
          xcodebuild -project MyApp.xcodeproj -scheme MyApp -sdk macosx
